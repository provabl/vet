name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Note: this is the Provabl suite's SLSA L3 pilot (provabl#5). Provenance is
# generated by the slsa-framework/slsa-github-generator reusable workflow, which
# runs on an isolated, non-falsifiable builder (the L3 requirement) and signs the
# provenance via Sigstore/Rekor itself. Direct binary signatures (cosign keyless)
# and the SBOM are kept alongside it. If this holds up on a real tag, the same
# pattern rolls out to the other suite repos.

permissions: {}  # set per-job below (least privilege)

jobs:
  # ── build: cross-compile all targets on one runner, sign, and emit the
  #     combined sha256 hashes the SLSA generator turns into L3 provenance ──
  build:
    name: Build + sign
    runs-on: ubuntu-latest
    permissions:
      contents: write      # upload release assets
      id-token: write      # OIDC for cosign keyless signing
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binaries (pure Go cross-compile)
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dist
          : > binaries.txt
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            export GOOS="${target%/*}" GOARCH="${target#*/}"
            BINARY="dist/vet-${VERSION}-${GOOS}-${GOARCH}"
            go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "${BINARY}" \
              ./cmd/vet
            echo "${BINARY}" >> binaries.txt
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries (cosign keyless)
        run: |
          while read -r BINARY; do
            cosign sign-blob --yes \
              --output-signature "${BINARY}.sig" \
              --output-certificate "${BINARY}.pem" \
              "${BINARY}"
          done < binaries.txt

      - name: Compute base64 hashes for SLSA provenance
        id: hash
        run: |
          # Hash the binaries only (not .sig/.pem) — provenance attests the
          # build artifacts. base64 -w0 keeps it on one line for the generator.
          HASHES=$(sha256sum $(cat binaries.txt) | base64 -w0)
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"

      - name: Upload release assets (binaries + signatures)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          fail_on_unmatched_files: true

  # ── provenance: SLSA L3 via the isolated reusable builder. This job IS the
  #     L3 guarantee — it runs in a trusted, non-falsifiable builder and signs
  #     the provenance, then attaches the .intoto.jsonl to the release. ──
  provenance:
    name: SLSA L3 provenance
    needs: build
    permissions:
      id-token: write      # sign the provenance via Sigstore
      contents: write      # attach provenance to the release
      actions: read        # read the workflow run for provenance
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true   # attach the provenance to the GitHub release

  sbom:
    name: SBOM
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # upload SBOM to release
      id-token: write       # OIDC for SBOM attestation
      attestations: write   # GitHub attestation API (SBOM)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: vet-${{ steps.version.outputs.VERSION }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: vet-${{ steps.version.outputs.VERSION }}.spdx.json
          sbom-path: vet-${{ steps.version.outputs.VERSION }}.spdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: vet-${{ steps.version.outputs.VERSION }}.spdx.json
          fail_on_unmatched_files: true
